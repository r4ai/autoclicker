name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build exe
        run: uv run pyinstaller --onefile --windowed --name autoclicker autoclicker.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/autoclicker.exe
          generate_release_notes: true
